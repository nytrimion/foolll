name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  algo:
    name: Algo (FizzBuzz)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Algo
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: PHP-CS-Fixer
        run: composer cs-check

      - name: PHPStan
        run: composer phpstan

      - name: PHPUnit
        run: composer test

  backend:
    name: Backend (Fleet)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Backend/PHP
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: PHP-CS-Fixer
        run: composer cs-check

      - name: PHPStan
        run: composer phpstan

      - name: PHPUnit
        run: composer test

      - name: Behat
        run: composer behat
